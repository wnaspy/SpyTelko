<!DOCTYPE html>
<html>
<head>

<title>SpyTelko Search endgine</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#222;
color:white;
padding:15px;
}

.container{
width:1100px;
margin:auto;
display:flex;
}

.news{
width:70%;
}

.sidebar{
width:30%;
background:white;
padding:10px;
margin-left:10px;
}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:5px;
}

.search-box{
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="header">
<h2>Telegram Search</h2>
</div>

<div class="container">

<div class="news">

<h3>Search News</h3>

<form class="search-box">
<input name="news_q" value="{{news_query or ''}}" placeholder="Search news text...">
<button>Search</button>
</form>

<h3>News</h3>

{% for n in news %}

<div class="card">

<b>{{n[0]}}</b>

<p>{{n[1]}}</p>

{% if n[2] %}
<a href="{{n[2]}}" target="_blank">{{n[2]}}</a>
{% endif %}

</div>

{% endfor %}

</div>

<div class="sidebar">

<h3>Search Documents</h3>

<form class="search-box">
<input name="doc_q" value="{{doc_query or ''}}" placeholder="Search document name...">
<button>Search</button>
</form>

<h3>Documents</h3>

{% for d in docs %}

<p>
<a href="/download?path={{d[1]}}">
📄 {{d[0]}}
</a>
</p>

{% endfor %}

</div>

</div>

</body>
</html>
